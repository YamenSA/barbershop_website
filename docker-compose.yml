services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=barbershop
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d barbershop"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/barbershop
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME}
      - EMAIL_REPLY_TO=${EMAIL_REPLY_TO}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
      - BREVO_API_KEY=${BREVO_API_KEY}
      # Muster B / Same-Origin: Der Browser spricht das Backend NICHT mehr direkt an,
      # sondern über den Same-Origin-Rewrite-Proxy des Frontends. CORS ist damit für den
      # Browser faktisch nicht mehr im Spiel. CORS_ORIGINS trotzdem gesetzt lassen
      # (schadet nicht, deckt Direktzugriffe/Tools ab).
      - CORS_ORIGINS=${CORS_ORIGINS}
      - COOKIE_SECURE=${COOKIE_SECURE}
      - RETENTION_GUEST_MONTHS=12
      - RETENTION_CUSTOMER_MONTHS=24
    # Das Host-Port-Mapping wird vom Browser NICHT mehr benötigt (Traffic läuft
    # Frontend-Proxy -> backend:8000 intern). Beibehalten nur, falls Coolify/ein Job
    # das Backend direkt erreichen muss; sonst kann es entfallen. Intern hört das
    # Backend weiterhin auf 8000.
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* wird zur Build-Zeit eingebacken -> relativ (/api/v1) fuer Same-Origin.
        - NEXT_PUBLIC_API_URL=/api/v1
    environment:
      # Ziel des serverseitigen Rewrite-Proxys UND der SSR-Fetches in lib/api.ts
      # (interner Compose-Netz-Name, Port 8000). Runtime-Env, nicht eingebacken.
      - BACKEND_INTERNAL_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
